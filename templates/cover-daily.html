<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .cover {
    width: 900px;
    height: 383px;
    position: relative;
    overflow: hidden;
    font-family: "Noto Sans SC", sans-serif;
  }
  .cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(
      to right,
      rgba(0, 0, 0, 0.82) 0%,
      rgba(0, 0, 0, 0.6) 55%,
      rgba(0, 0, 0, 0.15) 100%
    );
  }
  .content {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    padding: 0 56px;
    padding-bottom: 32px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding-top: 48px;
  }
  .tag {
    display: inline-block;
    background: rgba(129, 140, 248, 0.25);
    border: 1px solid rgba(129, 140, 248, 0.5);
    color: #c4b5fd;
    font-size: 14px;
    font-weight: 500;
    padding: 4px 14px;
    border-radius: 16px;
    letter-spacing: 2px;
    width: fit-content;
    margin-bottom: 16px;
  }
  .title {
    color: #f1f5f9;
    font-size: 40px;
    font-weight: 900;
    line-height: 1.4;
    letter-spacing: 1.5px;
    max-width: 620px;
  }
  .title em {
    font-style: normal;
    color: #a78bfa;
  }
  .bottom {
    position: absolute;
    bottom: 38px;
    right: 56px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }
  .bottom span {
    color: rgba(203, 213, 225, 0.7);
    font-size: 13px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="cover">
    <img src="../assets/bg-news-flow.png" />
    <div class="overlay"></div>
    <div class="content">
      <div class="tag">AI 日报</div>
      <div class="title">
        Sora 关停、迪士尼撤资<br>
        <em>Seedance</em> 搅局 AI 视频赛道
      </div>
    </div>
    <div class="bottom">
      <span>#001 · 2026.03.25</span>
      <span>@尤礼129</span>
    </div>
  </div>
</body>
</html>
